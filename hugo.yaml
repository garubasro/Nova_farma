baseURL: "https://garubasro.github.io/Nova_farma/"
languageCode: "sk"
defaultContentLanguage: "sk"
title: "Mestská Farma Bratislava"
theme: "mainroad"
pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

markup:
  goldmark:
    renderer:
      unsafe: true

ignoreLogs: ['warning-goldmark-raw-html']

Author:
  name: "Mestská Farma Bratislava"

params:
  description: "Čerstvá zelenina priamo z bratislavského poľa. Pestujeme prírodným spôsobom, bez chémie."
  copyright: "Mestská Farma Bratislava"
  opengraph: true
  schema: true
  twitter_cards: false
  readmore: true
  authorbox: false
  pager: true
  post_meta: ["date"]
  mainSections: ["posts"]
  highlight_color: "#4a7c3f"
  customCSS:
    - "css/farma.css"

  logo:
    image: "img/Logo-mensie.png"
    title: "Mestská Farma Bratislava"
    subtitle: "Čerstvá zelenina priamo z Bratislavy"

  thumbnail:
    visibility: ["list"]

  sidebar:
    home: "right"
    list: "right"
    single: false
    widgets: ["search", "recent", "social"]

  widgets:
    recent_num: 5
    categories_counter: false
    social:
      cached: false
      facebook: "MestskaFarma"
      instagram: "mestska_farma"

menu:
  main:
    - identifier: posts
      name: "Zápisky zo záhrady"
      url: /posts/
      weight: 10
    - identifier: zelenina
      name: "🥬 Zelenina"
      url: /zelenina/
      weight: 20
    - identifier: onas
      name: "O nás"
      url: /o-nas/
      weight: 30
    - identifier: kontakt
      name: "📲 Kontakt"
      url: /kontakt/
      weight: 40

taxonomies:
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON
